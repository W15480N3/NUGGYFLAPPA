<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; width: 400px; height: 600px; }
        canvas { border: 2px solid #333; }
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .menu-box { 
            background: rgba(10, 5, 0, 0.95); border: 4px solid #ffcc00; 
            border-radius: 20px; padding: 30px; text-align: center; width: 260px;
            box-shadow: 0 0 30px #ffcc00;
        }
        input { 
            background: #000; border: 2px solid #ffcc00; color: #ffcc00; 
            padding: 12px; font-size: 18px; border-radius: 8px; width: 80%; 
            margin: 15px 0; outline: none; font-family: 'Orbitron', sans-serif; text-align: center;
        }
        button { 
            background: #ffcc00; color: #000; border: none; padding: 15px; 
            font-size: 20px; font-weight: 900; border-radius: 10px; cursor: pointer; 
            width: 100%; font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div class="menu-box" id="start-menu">
                <h1 style="color:#ffcc00; margin:0; font-size: 28px;">HOPPYNUG</h1>
                <input type="text" id="player-name" placeholder="ID TAG" maxlength="10">
                <button id="start-btn">LIGHT UP</button>
            </div>
        </div>
    </div>

<script>
let score = 0, isStarted = false, hasShield = false, playerName = "NUGGY";
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic, hopSound, player, bongs, lighters, flames, scoreText, recordText;

const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: 400, height: 600,
    backgroundColor: '#000',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {
    this.load.image('nug', 'nug.png'); 
    this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); 
    this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png');
    this.load.image('summa_logo', 'summa.png'); 
    this.load.audio('bgm', 'background_track.mp3');
    this.load.audio('hop', 'jump_sound.mp3');
}

function create() {
    scoreText = this.add.text(20, 20, '', { fontSize: '24px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(100);
    recordText = this.add.text(200, 570, 'TENT RECORD: ' + champScore, { fontSize: '18px', fill: '#ffcc00', fontFamily: 'Orbitron' }).setOrigin(0.5).setDepth(100);
    this.add.image(380, 580, 'summa_logo').setScale(0.1).setAlpha(0.4).setOrigin(1,1);

    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });
    hopSound = this.sound.add('hop', { volume: 0.3 });

    player = this.physics.add.sprite(100, 300, 'nug').setScale(0.35).setDepth(10);
    player.body.allowGravity = false;

    bongs = this.physics.add.group(); 
    lighters = this.physics.add.group(); 
    flames = this.add.group();

    this.physics.add.overlap(player, bongs, () => gameOver.call(this));
    this.physics.add.overlap(player, lighters, () => gameOver.call(this));

    this.input.on('pointerdown', () => { 
        if (!isStarted) return;
        player.setVelocityY(-400);
        hopSound.play(); 
        player.setTexture('nug_active'); 
        this.time.delayedCall(150, () => { if (isStarted) player.setTexture('nug'); }); 
    });

    document.getElementById('start-btn').onclick = () => {
        let nameIn = document.getElementById('player-name').value;
        if(nameIn) playerName = nameIn.toUpperCase();
        document.getElementById('ui-layer').style.display = 'none';
        
        isStarted = true;
        player.body.allowGravity = true;
        scoreText.setText(playerName + ": 0");
        bgMusic.play();
        this.spawnTimer = this.time.addEvent({ delay: 2200, callback: spawnLevel, callbackScope: this, loop: true });
    };
}

function spawnLevel() {
    if (!isStarted) return;
    const y = Phaser.Math.Between(150, 450);
    const top = bongs.create(500, y - 150, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(500, y + 150, 'bong').setOrigin(0.5, 0);
    [top, bot].forEach(b => { b.body.allowGravity = false; b.setVelocityX(-200); });

    if (Math.random() > 0.6) {
        let lY = Phaser.Math.Between(100, 500);
        let l = lighters.create(600, lY, 'lighter').setScale(0.08);
        l.body.allowGravity = false; l.setVelocityX(-180);
        flames.add(this.add.image(l.x, lY, 'flame').setScale(0.08).setDepth(11));
    }
}

function update() {
    if (!isStarted) return;
    if (player.y > 600 || player.y < 0) { gameOver.call(this); return; }

    bongs.getChildren().forEach(b => {
        if (b.x < player.x && !b.scored) { 
            score += 0.5; 
            if(Math.floor(score) > Math.floor(score - 0.5)) scoreText.setText(playerName + ": " + Math.floor(score));
            b.scored = true; 
        }
        if (b.x < -100) b.destroy();
    });

    lighters.getChildren().forEach((l, i) => {
        l.angle += 2;
        let f = flames.getChildren()[i];
        if (f) {
            let rad = Phaser.Math.DegToRad(l.angle);
            f.x = l.x + Math.cos(rad) * -60;
            f.y = l.y + Math.sin(rad) * -60;
            f.angle = l.angle;
            f.setAlpha(this.time.now % 400 < 200 ? 0.5 : 1);
        }
        if (l.x < -100) { l.destroy(); if(f) f.destroy(); }
    });
}

function gameOver() { 
    if (!isStarted) return; isStarted = false;
    this.physics.pause();
    this.spawnTimer.remove();
    
    let final = Math.floor(score);
    if (final > champScore) { 
        champScore = final; 
        localStorage.setItem('hoppyNugChampScore', final); 
        recordText.setText('TENT RECORD: ' + final); 
    }

    let overlay = document.getElementById('ui-layer');
    overlay.style.display = 'flex';
    document.getElementById('start-menu').innerHTML = `
        <h2 style="color:#fff; margin:0;">CASHED OUT</h2>
        <h1 style="color:#ffcc00; font-size:48px; margin:10px 0;">${final}</h1>
        <button onclick="location.reload()">RE-UP</button>
    `;
}
</script>
</body>
</html>

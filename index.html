<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Orbitron', sans-serif; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 999999; }
        .menu { pointer-events: auto; background: rgba(10, 5, 0, 0.98); border: 4px solid #ffcc00; border-radius: 20px; padding: 40px; color: white; text-align: center; width: 300px; display: none; position: absolute; box-shadow: 0 0 50px #ffcc00; }
        button { background: #ffcc00; color: #000; border: none; padding: 18px; font-size: 24px; font-weight: 900; border-radius: 12px; cursor: pointer; width: 100%; font-family: 'Orbitron', sans-serif; margin-top: 20px; }
        input#player-name { background: #000; border: 2px solid #ffcc00; color: #ffcc00; padding: 12px; font-size: 20px; border-radius: 8px; text-align: center; margin: 20px 0; width: 90%; outline: none; font-family: 'Orbitron', sans-serif; }
        #session-record { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #ffcc00; font-weight: 900; z-index: 101; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="session-record">TENT RECORD: 0</div>
        <div id="start-menu" class="menu" style="display: block;">
            <h1 style="color:#ffcc00; margin:0; font-size: 42px;">HOPPYNUG</h1>
            <input type="text" id="player-name" placeholder="ID TAG" maxlength="10">
            <button id="start-btn">LIGHT UP</button>
        </div>
        <div id="game-over" class="menu">
            <h1 style="margin:0; font-size: 32px;">CASHED OUT!</h1>
            <p id="final-score-text" style="font-size: 36px; color: #ffcc00; margin: 20px 0;">0</p>
            <button id="retry-btn">RE-UP</button>
        </div>
    </div>

<script>
let score = 0, isStarted = false, hasShield = false;
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic, player, bongs, lighters, flames, shields, vaporTrail, vaporUp, vaporDown, scoreText, shieldStatusText;
let starLayerFar, starLayerMid;

const config = {
    type: Phaser.AUTO, width: 400, height: 600, backgroundColor: '#000',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {
    this.load.image('nug', 'nug.png'); 
    this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); 
    this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png');
    this.load.image('summa_logo', 'summa.png'); 
    this.load.audio('bgm', 'background_track.mp3');
    
    let g = this.make.graphics();
    g.fillStyle(0xffffff, 0.4); g.fillCircle(8, 8, 8); g.generateTexture('smoke_tx', 16, 16);
    g.clear(); g.fillStyle(0xffffff, 1); g.fillCircle(2, 2, 2); g.generateTexture('star_tx', 4, 4);
}

function create() {
    // PARALLAX STARS SETUP
    starLayerFar = this.add.group();
    starLayerMid = this.add.group();
    for(let i=0; i<20; i++) {
        starLayerFar.add(this.add.image(Phaser.Math.Between(0, 400), Phaser.Math.Between(0, 600), 'star_tx').setAlpha(0.2).setScale(0.5));
        starLayerMid.add(this.add.image(Phaser.Math.Between(0, 400), Phaser.Math.Between(0, 600), 'star_tx').setAlpha(0.5).setScale(0.8));
    }

    this.add.image(380, 580, 'summa_logo').setScale(0.1).setAlpha(0.2).setOrigin(1,1);
    scoreText = this.add.text(20, 20, '', { fontSize: '28px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(100);
    shieldStatusText = this.add.text(20, 55, '', { fontSize: '16px', fill: '#ffffff', fontFamily: 'Orbitron', fontWeight: '700' }).setDepth(100);
    
    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });

    // SMOKE: Drifts right (+40) and looks bigger (scale 1.5 to 3.5)
    vaporTrail = this.add.particles(0, 0, 'smoke_tx', { scale: { start: 0.4, end: 1 }, alpha: { start: 0.4, end: 0 }, lifespan: 600, speedX: -100, emitting: false }).setDepth(5);
    vaporUp = this.add.particles(0, 0, 'smoke_tx', { scale: { start: 1.5, end: 3.5 }, alpha: { start: 0.2, end: 0 }, lifespan: 2500, speedX: 40, speedY: -50, frequency: -1 }).setDepth(4);
    vaporDown = this.add.particles(0, 0, 'smoke_tx', { scale: { start: 1.5, end: 3.5 }, alpha: { start: 0.2, end: 0 }, lifespan: 2500, speedX: 40, speedY: 50, frequency: -1 }).setDepth(4);

    player = this.physics.add.sprite(100, 300, 'nug').setScale(0.35).setDepth(10);
    player.body.setCircle(45, 290, 95); 
    player.body.allowGravity = false;

    bongs = this.physics.add.group(); 
    lighters = this.physics.add.group(); 
    shields = this.physics.add.group();
    flames = this.add.group();

    this.physics.add.overlap(player, bongs, (p, b) => handleHit.call(this, b), null, this);
    this.physics.add.overlap(player, lighters, (p, l) => handleHit.call(this, l), null, this);
    this.physics.add.overlap(player, shields, (p, s) => { s.destroy(); hasShield = true; }, null, this);

    this.input.on('pointerdown', () => { 
        if (!isStarted) return;
        player.setVelocityY(-420);
        player.setTexture('nug_active'); 
        this.time.delayedCall(120, () => { if (isStarted) player.setTexture('nug'); }); 
    });

    document.getElementById('start-btn').onclick = () => { 
        if (!this.scale.isFullscreen) this.scale.startFullscreen();
        startGame.call(this); 
    };
    document.getElementById('retry-btn').onclick = () => { location.reload(); };
    updateUI();
}

function startGame() {
    document.getElementById('start-menu').style.display = 'none';
    isStarted = true; score = 0; hasShield = false;
    player.body.allowGravity = true;
    player.body.setVelocity(0, 0);
    vaporTrail.start(); 
    if (!bgMusic.isPlaying) bgMusic.play();
    this.spawnTimer = this.time.addEvent({ delay: 2000, callback: spawnLevel, callbackScope: this, loop: true }); 
}

function spawnLevel() {
    if (!isStarted) return;
    const y = Phaser.Math.Between(150, 450);
    const top = bongs.create(500, y - 140, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(500, y + 140, 'bong').setOrigin(0.5, 0);
    [top, bot].forEach(b => { b.body.allowGravity = false; b.setVelocityX(-220); b.body.setSize(80, 380).setOffset(320, 0); });

    if (Phaser.Math.Between(0, 10) > 7) {
        let lY = Phaser.Math.Between(100, 500);
        let l = lighters.create(600, lY, 'lighter').setScale(0.08);
        l.body.allowGravity = false; l.setVelocityX(-180);
        l.body.setCircle(360).setOffset(180, 90);
        flames.add(this.add.image(l.x, lY, 'flame').setScale(0.08).setDepth(11));
    }
    if (Phaser.Math.Between(0, 10) > 8 && !hasShield) {
        let s = shields.create(600, Phaser.Math.Between(100, 500), 'summa_logo').setScale(0.1).setTint(0xffcc00);
        s.body.allowGravity = false; s.setVelocityX(-200);
    }
}

function update() {
    // PARALLAX MOVEMENT
    starLayerFar.getChildren().forEach(s => { s.x -= 0.5; if(s.x < -10) s.x = 410; });
    starLayerMid.getChildren().forEach(s => { s.x -= 1.5; if(s.x < -10) s.x = 410; });

    if (!isStarted) { player.y = 300 + Math.sin(this.time.now / 400) * 10; return; }
    if (player.y > 600 || player.y < 0) { gameOver.call(this); return; }

    vaporTrail.emitParticleAt(player.x - 20, player.y);

    bongs.getChildren().forEach(b => {
        if (this.time.now % 180 < 20) {
            if (b.flipY) vaporDown.emitParticleAt(b.x, b.y + 10);
            else vaporUp.emitParticleAt(b.x, b.y - 10);
        }
        if (b.x < player.x && !b.scored) { 
            score += 0.5; if(Math.floor(score) > Math.floor(score - 0.5)) { 
                scoreText.setText("NUG: " + Math.floor(score)); 
            }
            b.scored = true; 
        }
    });

    flames.getChildren().forEach((f, i) => {
        let l = lighters.getChildren()[i];
        if (l) { f.x = l.x; f.y = l.y; f.angle = l.angle += 4; } else f.destroy();
    });

    if (hasShield && isStarted) {
        player.setTint(0xffcc00); shieldStatusText.setText("🛡️ SUMMA SHIELD ACTIVE");
    } else {
        player.clearTint(); shieldStatusText.setText("");
    }
}

function handleHit(obj) {
    player.setTint(0xff0000);
    if (hasShield) { 
        hasShield = false; obj.destroy(); this.cameras.main.shake(200, 0.02); 
        this.time.delayedCall(200, () => { if(isStarted) player.clearTint(); });
    } else { gameOver.call(this); }
}

function gameOver() { 
    if (!isStarted) return; isStarted = false;
    this.physics.pause();
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('final-score-text').innerText = Math.floor(score);
    if (Math.floor(score) > champScore) { champScore = Math.floor(score); localStorage.setItem('hoppyNugChampScore', champScore); }
    updateUI();
}

function updateUI() { document.getElementById('session-record').innerText = `TENT RECORD: ${champScore}`; }
</script>
</body>
</html>

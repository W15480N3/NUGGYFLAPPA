<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        /* This ensures the input tag stays hidden until we need it, but stays centered */
        #input-container {
            position: absolute; top: 43%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; display: block;
        }
        input {
            background: #fff; border: 2px solid #ffcc00; color: #000; 
            padding: 10px; font-size: 18px; border-radius: 5px; width: 180px;
            text-align: center; font-family: 'Orbitron', sans-serif; outline: none;
        }
    </style>
</head>
<body>
    <div id="input-container">
        <input type="text" id="player-name" placeholder="ID TAG" maxlength="10">
    </div>

<script>
let score = 0, isStarted = false, hasShield = false, playerName = "NUGGY";
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic, hopSound, player, bongs, lighters, flames, scoreText, recordText, startButton, menuBg;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth, // Use full width
    height: window.innerHeight, // Use full height
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    backgroundColor: '#000',
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {
    this.load.image('nug', 'nug.png'); 
    this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); 
    this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png');
    this.load.image('summa_logo', 'summa.png'); 
    this.load.audio('bgm', 'background_track.mp3');
    this.load.audio('hop', 'jump_sound.mp3');
}

function create() {
    const cx = this.cameras.main.centerX;
    const cy = this.cameras.main.centerY;

    // --- START MENU (Inside Phaser) ---
    menuBg = this.add.rectangle(cx, cy, 300, 350, 0x0a0500).setStrokeStyle(4, 0xffcc00).setDepth(15);
    let title = this.add.text(cx, cy - 100, 'HOPPYNUG', { fontSize: '32px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5).setDepth(16);
    
    startButton = this.add.rectangle(cx, cy + 80, 200, 60, 0xffcc00).setInteractive().setDepth(16);
    let startText = this.add.text(cx, cy + 80, 'LIGHT UP', { fontSize: '24px', fill: '#000', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5).setDepth(17);

    // UI elements (hidden at start)
    scoreText = this.add.text(20, 20, '', { fontSize: '28px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(100).setVisible(false);
    recordText = this.add.text(cx, window.innerHeight - 40, 'TENT RECORD: ' + champScore, { fontSize: '18px', fill: '#ffcc00', fontFamily: 'Orbitron' }).setOrigin(0.5).setDepth(100);
    this.add.image(window.innerWidth - 20, window.innerHeight - 20, 'summa_logo').setScale(0.12).setAlpha(0.4).setOrigin(1,1);

    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });
    hopSound = this.sound.add('hop', { volume: 0.3 });

    player = this.physics.add.sprite(cx * 0.5, cy, 'nug').setScale(0.35).setDepth(10);
    player.body.allowGravity = false;

    bongs = this.physics.add.group(); 
    lighters = this.physics.add.group(); 
    flames = this.add.group();

    this.physics.add.overlap(player, bongs, () => gameOver.call(this));
    this.physics.add.overlap(player, lighters, () => gameOver.call(this));

    // Handle Start Click
    startButton.on('pointerdown', () => {
        let nameIn = document.getElementById('player-name').value;
        if(nameIn) playerName = nameIn.toUpperCase();
        
        document.getElementById('input-container').style.display = 'none';
        menuBg.setVisible(false);
        title.setVisible(false);
        startButton.setVisible(false);
        startText.setVisible(false);
        
        if (!this.scale.isFullscreen) this.scale.startFullscreen();
        
        isStarted = true;
        player.body.allowGravity = true;
        scoreText.setText(playerName + ": 0").setVisible(true);
        if(!bgMusic.isPlaying) bgMusic.play();
        this.spawnTimer = this.time.addEvent({ delay: 2000, callback: spawnLevel, callbackScope: this, loop: true });
    });

    // Jump logic
    this.input.on('pointerdown', (pointer) => { 
        if (!isStarted || pointer.y > window.innerHeight - 100 && !isStarted) return; 
        player.setVelocityY(-420);
        hopSound.play(); 
        player.setTexture('nug_active'); 
        this.time.delayedCall(150, () => { if (isStarted) player.setTexture('nug'); }); 
    });
}

function spawnLevel() {
    if (!isStarted) return;
    const xPos = window.innerWidth + 100;
    const y = Phaser.Math.Between(window.innerHeight * 0.2, window.innerHeight * 0.8);
    
    const top = bongs.create(xPos, y - 160, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(xPos, y + 160, 'bong').setOrigin(0.5, 0);
    [top, bot].forEach(b => { b.body.allowGravity = false; b.setVelocityX(-220); });

    if (Math.random() > 0.6) {
        let lY = Phaser.Math.Between(100, window.innerHeight - 100);
        let l = lighters.create(xPos + 200, lY, 'lighter').setScale(0.09);
        l.body.allowGravity = false; l.setVelocityX(-200);
        flames.add(this.add.image(l.x, lY, 'flame').setScale(0.09).setDepth(11));
    }
}

function update() {
    if (!isStarted) return;
    if (player.y > window.innerHeight || player.y < 0) { gameOver.call(this); return; }

    bongs.getChildren().forEach(b => {
        if (b.x < player.x && !b.scored) { 
            score += 0.5; 
            if(Math.floor(score) > Math.floor(score - 0.5)) scoreText.setText(playerName + ": " + Math.floor(score));
            b.scored = true; 
        }
        if (b.x < -100) b.destroy();
    });

    lighters.getChildren().forEach((l, i) => {
        l.angle += 2;
        let f = flames.getChildren()[i];
        if (f) {
            let rad = Phaser.Math.DegToRad(l.angle);
            f.x = l.x + Math.cos(rad) * -65; // Flame on tip
            f.y = l.y + Math.sin(rad) * -65;
            f.angle = l.angle;
            f.setAlpha(this.time.now % 300 < 150 ? 0.5 : 1);
        }
        if (l.x < -100) { l.destroy(); if(f) f.destroy(); }
    });
}

function gameOver() { 
    if (!isStarted) return; isStarted = false;
    this.physics.pause();
    this.spawnTimer.remove();
    bgMusic.stop();
    
    let final = Math.floor(score);
    if (final > champScore) { 
        champScore = final; 
        localStorage.setItem('hoppyNugChampScore', final); 
    }

    // Direct Screen Refresh for Game Over to reset everything clean
    setTimeout(() => { location.reload(); }, 1000);
}
</script>
</body>
</html>

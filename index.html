<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<script>
let score = 0, isStarted = false, hasShield = false, playerName = "NUGGY";
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic, hopSound, player, bongs, lighters, flames, shields, scoreText, shieldStatusText, recordText;
let startBtn, menuBox, titleText, nameInputDisplay;

const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 600,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    backgroundColor: '#000',
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {
    this.load.image('nug', 'nug.png'); 
    this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); 
    this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png');
    this.load.image('summa_logo', 'summa.png'); 
    this.load.audio('bgm', 'background_track.mp3');
    this.load.audio('hop', 'jump_sound.mp3');
}

function create() {
    const cx = 200;
    const cy = 300;

    // --- GAME UI ---
    scoreText = this.add.text(20, 20, '', { fontSize: '24px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(100).setVisible(false);
    recordText = this.add.text(cx, 570, 'TENT RECORD: ' + champScore, { fontSize: '18px', fill: '#ffcc00', fontFamily: 'Orbitron' }).setOrigin(0.5).setDepth(100);
    this.add.image(380, 580, 'summa_logo').setScale(0.1).setAlpha(0.3).setOrigin(1, 1);

    // --- NATIVE PHASER MENU ---
    menuBox = this.add.rectangle(cx, cy, 320, 360, 0x0a0500).setStrokeStyle(4, 0xffcc00).setDepth(50);
    titleText = this.add.text(cx, cy - 110, 'HOPPYNUG', { fontSize: '32px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5).setDepth(51);
    
    // Fake Input Box
    let inputBg = this.add.rectangle(cx, cy, 240, 50, 0xffffff).setDepth(51).setInteractive();
    nameInputDisplay = this.add.text(cx, cy, 'CLICK TO TAG', { fontSize: '18px', fill: '#000', fontFamily: 'Orbitron' }).setOrigin(0.5).setDepth(52);
    
    startBtn = this.add.rectangle(cx, cy + 90, 220, 60, 0xffcc00).setInteractive().setDepth(51);
    let startBtnTxt = this.add.text(cx, cy + 90, 'LIGHT UP', { fontSize: '24px', fill: '#000', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5).setDepth(52);

    // --- INPUT LOGIC ---
    inputBg.on('pointerdown', () => {
        let tag = prompt("ENTER ID TAG:", playerName);
        if (tag) {
            playerName = tag.toUpperCase().substring(0, 10);
            nameInputDisplay.setText(playerName);
        }
    });

    startBtn.on('pointerdown', () => {
        [menuBox, titleText, startBtn, startBtnTxt, inputBg, nameInputDisplay].forEach(el => el.destroy());
        if (this.sound.context.state === 'suspended') this.sound.context.resume();
        
        isStarted = true;
        player.body.allowGravity = true;
        scoreText.setText(playerName + ": 0").setVisible(true);
        bgMusic.play();
        this.spawnTimer = this.time.addEvent({ delay: 2200, callback: spawnLevel, callbackScope: this, loop: true });
    });

    // --- GAME ENGINE ---
    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });
    hopSound = this.sound.add('hop', { volume: 0.3 });
    player = this.physics.add.sprite(100, 300, 'nug').setScale(0.35).setDepth(10);
    player.body.allowGravity = false;
    bongs = this.physics.add.group(); 
    lighters = this.physics.add.group(); 
    flames = this.add.group();

    this.physics.add.overlap(player, bongs, () => gameOver.call(this));
    this.physics.add.overlap(player, lighters, () => gameOver.call(this));

    this.input.on('pointerdown', (pointer) => { 
        if (!isStarted || pointer.y > 500) return;
        player.setVelocityY(-400);
        hopSound.play(); 
        player.setTexture('nug_active'); 
        this.time.delayedCall(150, () => { if (isStarted) player.setTexture('nug'); }); 
    });
}

function spawnLevel() {
    if (!isStarted) return;
    const y = Phaser.Math.Between(150, 450);
    const top = bongs.create(500, y - 160, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(500, y + 160, 'bong').setOrigin(0.5, 0);
    [top, bot].forEach(b => { b.body.allowGravity = false; b.setVelocityX(-210); });

    if (Math.random() > 0.6) {
        let lY = Phaser.Math.Between(100, 500);
        let l = lighters.create(600, lY, 'lighter').setScale(0.08);
        l.body.allowGravity = false; l.setVelocityX(-180);
        flames.add(this.add.image(l.x, lY, 'flame').setScale(0.08).setDepth(11));
    }
}

function update() {
    if (!isStarted) return;
    if (player.y > 600 || player.y < 0) { gameOver.call(this); return; }

    bongs.getChildren().forEach(b => {
        if (b.x < player.x && !b.scored) { 
            score += 0.5; if(Math.floor(score) > Math.floor(score - 0.5)) scoreText.setText(playerName + ": " + Math.floor(score));
            b.scored = true; 
        }
        if (b.x < -100) b.destroy();
    });

    lighters.getChildren().forEach((l, i) => {
        l.angle += 2;
        let f = flames.getChildren()[i];
        if (f) {
            let rad = Phaser.Math.DegToRad(l.angle);
            f.x = l.x + Math.cos(rad) * -60;
            f.y = l.y + Math.sin(rad) * -60;
            f.angle = l.angle;
            f.setAlpha(this.time.now % 400 < 200 ? 0.4 : 1);
        }
        if (l.x < -100) { l.destroy(); if(f) f.destroy(); }
    });
}

function gameOver() { 
    if (!isStarted) return; isStarted = false;
    this.physics.pause();
    setTimeout(() => { location.reload(); }, 1000);
}
</script>
</body>
</html>

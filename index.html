<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA GLITCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Orbitron', sans-serif; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 1000; }
        
        @keyframes goldPulse {
            0% { box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); border-color: #ffcc00; }
            50% { box-shadow: 0 0 60px rgba(255, 204, 0, 0.8); border-color: #ffffff; }
            100% { box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); border-color: #ffcc00; }
        }

        .menu { 
            pointer-events: auto; background: rgba(10, 5, 0, 0.95); 
            border: 3px solid #ffcc00; border-radius: 20px; padding: 40px; 
            color: white; text-align: center; text-transform: uppercase; width: 300px; display: none;
            position: absolute; animation: goldPulse 3s infinite ease-in-out;
        }
        
        #game-over { z-index: 3000; animation: none; border-color: #ffffff; box-shadow: 0 0 50px #000; }
        #leaderboard-screen { z-index: 2500; } /* Glitch logic tied to this ID */
        #start-menu { z-index: 2000; }

        input#player-name { background: #000; border: 2px solid #ffcc00; color: #ffcc00; padding: 12px; font-size: 20px; border-radius: 8px; text-align: center; margin: 20px 0; width: 90%; outline: none; font-family: 'Orbitron', sans-serif; }
        button { background: #ffcc00; color: #000; border: none; padding: 15px; font-size: 22px; font-weight: 900; border-radius: 8px; cursor: pointer; width: 100%; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #ffffff; }
        
        .glow-text { color: #ffcc00; text-shadow: 0 0 20px #ffcc00; }
        .gold { color: #ffffff; text-shadow: 0 0 20px #ffcc00; font-size: 32px; }
        #session-record { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #ffcc00; font-weight: 900; z-index: 101; font-size: 22px; text-shadow: 0 0 15px rgba(255,204,0,0.5); pointer-events: none; }
        #mute-btn { position: absolute; top: 20px; right: 20px; pointer-events: auto; color: #ffcc00; font-size: 24px; cursor: pointer; z-index: 4000; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 12px; border: 1px solid #ffcc00; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="mute-btn">🔊</div>
    <div id="ui-layer">
        <div id="session-record">TENT RECORD: 0</div>
        
        <div id="start-menu" class="menu" style="display: block;">
            <h1 class="glow-text" style="margin:0; font-size: 40px; font-weight: 900;">HOPPYNUG</h1>
            <input type="text" id="player-name" placeholder="ID TAG" maxlength="10">
            <p id="best-display" style="color: #888; margin: 10px 0; font-size: 14px;">PERSONAL BEST: 0</p>
            <button id="start-btn">LIGHT UP</button>
        </div>

        <div id="leaderboard-screen" class="menu">
            <h2 style="color: #ffffff; margin:0;">CHAMPION STASH</h2>
            <hr style="border: 1px solid #444; margin: 20px 0;">
            <p style="font-size: 14px; color: #888;">CURRENT REIGNING CHAMP:</p>
            <h1 id="champ-name" class="gold">NONE</h1>
            <h2 id="champ-score" class="glow-text" style="font-size: 40px;">0</h2>
            <p style="font-size: 10px; color: #ffcc00; margin-top: 20px;">TAP TO CHALLENGE</p>
        </div>

        <div id="game-over" class="menu">
            <h1 style="color: #ffffff; margin:0; font-size: 36px;">CASHED OUT!</h1>
            <p id="final-score-text" style="font-size: 28px; margin: 20px 0; color: #ffcc00;">SCORE: 0</p>
            <button id="retry-btn">RE-UP</button>
        </div>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let isMuted = false, score = 0, isStarted = false, idleTimer;
let playerName = localStorage.getItem('hoppyNugName') || "";
let highScore = parseInt(localStorage.getItem('hoppyNugBest')) || 0;
let champName = localStorage.getItem('hoppyNugChampName') || "TENT PILOT";
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic;

document.getElementById('mute-btn').onclick = function() {
    isMuted = !isMuted;
    this.innerText = isMuted ? "🔇" : "🔊";
    if (bgMusic) { if (isMuted) bgMusic.pause(); else if (isStarted) bgMusic.resume(); }
};

function showOnly(id) {
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('leaderboard-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    if(id) document.getElementById(id).style.display = 'block';
    
    // Toggle Glitch Layer based on Leaderboard screen
    if (glitchLayer) glitchLayer.setVisible(id === 'leaderboard-screen');
}

function updateUI() {
    document.getElementById('session-record').innerText = `TENT RECORD: ${champScore}`;
    document.getElementById('champ-name').innerText = champName.toUpperCase();
    document.getElementById('champ-score').innerText = champScore;
    document.getElementById('best-display').innerText = "PERSONAL BEST: " + highScore;
}
updateUI();

function resetIdleTimer() {
    if (isStarted || document.getElementById('game-over').style.display === 'block') return;
    clearTimeout(idleTimer);
    showOnly('start-menu');
    idleTimer = setTimeout(() => {
        if (!isStarted && document.getElementById('game-over').style.display !== 'block') {
            showOnly('leaderboard-screen');
        }
    }, 10000); 
}

window.addEventListener('mousedown', resetIdleTimer);
window.addEventListener('touchstart', resetIdleTimer);

function playSfx(type) {
    if (isMuted) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'jump') { 
        osc.type = 'triangle'; osc.frequency.setValueAtTime(180, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.15); 
        gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0, now + 0.15); 
        osc.start(); osc.stop(now + 0.15); 
    } else if (type === 'crash') { 
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(20, now + 0.4); 
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); 
        osc.start(); osc.stop(now + 0.4); 
    } else if (type === 'score') { 
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1); 
        gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.1); 
        osc.start(); osc.stop(now + 0.1); 
    }
}

const config = { 
    type: Phaser.AUTO, width: 400, height: 600, backgroundColor: '#000', 
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } }, 
    scene: { preload, create, update } 
};
const game = new Phaser.Game(config);
let player, bongs, lighters, flames, vaporTrail, terpSparkle, vaporUp, vaporDown, starGroup, scoreText, scoreBox, summaLogo, glitchLayer;

function preload() {
    this.load.image('nug', 'nug.png'); this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png'); this.load.audio('bgm', 'background_track.mp3');
    this.load.image('summa_logo', 'summa.png'); 
    
    let g = this.make.graphics(); g.fillStyle(0xffffff, 1); g.fillCircle(8, 8, 8); g.generateTexture('vapor_puff', 16, 16);
    let s = this.make.graphics(); s.fillStyle(0xffffff, 1); s.fillCircle(2, 2, 2); s.generateTexture('pixel_star', 4, 4);
    let t = this.make.graphics(); t.fillStyle(0xffcc00, 1); t.fillCircle(2, 2, 2); t.generateTexture('terp_bit', 4, 4);
}

function create() {
    // 1. TILING GLITCH LAYER (Background for Leaderboard)
    glitchLayer = this.add.group();
    for(let i=0; i<4; i++) {
        for(let j=0; j<6; j++) {
            let logo = this.add.image(i * 120 + 20, j * 120 + 20, 'summa_logo').setScale(0.08).setAlpha(0).setDepth(0);
            glitchLayer.add(logo);
        }
    }
    glitchLayer.setVisible(false);

    summaLogo = this.add.image(380, 580, 'summa_logo').setScale(0.12).setOrigin(1, 1).setDepth(1).setAlpha(0.6);

    starGroup = this.add.group();
    this.time.addEvent({ delay: 300, callback: () => { 
        let speed = Phaser.Math.FloatBetween(0.3, 1.2);
        let star = this.add.image(420, Phaser.Math.Between(0, 600), 'pixel_star'); 
        star.setAlpha(speed / 1.5).setData('speed', speed); starGroup.add(star); 
    }, loop: true });

    vaporTrail = this.add.particles(0, 0, 'vapor_puff', { scale: { start: 0.3, end: 1.2 }, alpha: { start: 0.3, end: 0 }, lifespan: 700, speedX: { min: -100, max: -150 }, frequency: -1 }).setDepth(5);
    terpSparkle = this.add.particles(0, 0, 'terp_bit', { scale: { start: 1, end: 0 }, alpha: { start: 1, end: 0 }, lifespan: 600, speed: { min: 20, max: 80 }, frequency: -1 }).setDepth(6);
    vaporUp = this.add.particles(0, 0, 'vapor_puff', { scale: { start: 0.6, end: 2.2 }, alpha: { start: 0.6, end: 0 }, lifespan: 1800, speedY: { min: -40, max: -80 }, frequency: -1 }).setDepth(4);
    vaporDown = this.add.particles(0, 0, 'vapor_puff', { scale: { start: 0.6, end: 2.2 }, alpha: { start: 0.6, end: 0 }, lifespan: 1800, speedY: { min: 40, max: 80 }, frequency: -1 }).setDepth(4);

    player = this.physics.add.sprite(100, 300, 'nug').setScale(0.35).setDepth(10);
    player.body.setCircle(45, 290, 95); player.body.allowGravity = false;

    scoreBox = this.add.graphics().setDepth(99);
    scoreText = this.add.text(30, 30, '', { fontSize: '18px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(100);
    
    bongs = this.physics.add.group(); lighters = this.physics.add.group(); flames = this.add.group();
    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });

    this.input.on('pointerdown', () => { 
        if (!isStarted) return; 
        player.setVelocityY(-410); playSfx('jump');
        player.setTexture('nug_active'); 
        terpSparkle.emitParticleAt(player.x, player.y, 5);
        this.time.delayedCall(150, () => { if (isStarted) player.setTexture('nug'); }); 
    });

    this.physics.add.overlap(player, bongs, gameOver, null, this);
    this.physics.add.overlap(player, lighters, gameOver, null, this);
    
    document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); startGame.call(this); };
    document.getElementById('retry-btn').onclick = (e) => { e.stopPropagation(); window.location.reload(); };
    resetIdleTimer();
}

function update() {
    starGroup.getChildren().forEach(s => { s.x -= s.getData('speed'); if (s.x < -20) s.destroy(); });

    // 2. GLITCH ANIMATION LOGIC
    if (glitchLayer && glitchLayer.visible) {
        glitchLayer.getChildren().forEach(logo => {
            if (Math.random() > 0.92) {
                logo.setAlpha(Phaser.Math.FloatBetween(0.05, 0.25));
                logo.setX(logo.x + Phaser.Math.Between(-5, 5));
                logo.setTint(Math.random() > 0.5 ? 0xff0000 : 0x00ffff); // Red/Cyan glitch tint
            } else {
                logo.setAlpha(0.08);
                logo.clearTint();
            }
        });
    }

    if (!isStarted) { player.y = 300 + Math.sin(this.time.now / 400) * 10; return; }
    
    scoreBox.clear(); scoreBox.lineStyle(2, 0xffcc00, 0.8);
    scoreBox.strokeRect(20, 20, scoreText.width + 20, scoreText.height + 20);

    if (player.y > 600 || player.y < 0) gameOver.call(this);
    if (this.time.now % 60 < 20) vaporTrail.emitParticleAt(player.x - 25, player.y + 5);

    bongs.getChildren().forEach(bong => {
        if (bong.x > 0 && bong.x < 420 && this.time.now % 120 < 20) {
            if (bong.flipY) vaporDown.emitParticleAt(bong.x, bong.y + 10); else vaporUp.emitParticleAt(bong.x, bong.y - 10);
        }
        if (bong.x < player.x && !bong.scored) { 
            score += 0.5; 
            if(Math.floor(score) > Math.floor(score - 0.5)) {
                scoreText.setText(`${playerName.toUpperCase()}: ${Math.floor(score)}`); 
                playSfx('score'); terpSparkle.emitParticleAt(player.x, player.y, 10);
            }
            bong.scored = true; 
        }
    });

    lighters.getChildren().forEach((l, i) => { 
        let f = flames.getChildren()[i]; l.angle += 3.5; l.y = l.startY + Math.sin(this.time.now / 300) * 40; 
        if (f) { let rad = Phaser.Math.DegToRad(l.angle + 180); f.x = l.x + Math.cos(rad) * 45; f.y = l.y + Math.sin(rad) * 45; f.angle = l.angle; }
    });
}

function startGame() { 
    clearTimeout(idleTimer); showOnly(null); summaLogo.setAlpha(0.2); 
    playerName = document.getElementById('player-name').value || "PILOT"; 
    localStorage.setItem('hoppyNugName', playerName);
    scoreText.setText(`${playerName.toUpperCase()}: 0`); 
    isStarted = true; player.body.allowGravity = true; 
    if (bgMusic && !isMuted) bgMusic.play();
    this.time.addEvent({ delay: 2200, callback: spawnBongs, callbackScope: this, loop: true }); 
    this.time.addEvent({ delay: 5000, callback: spawnLighter, callbackScope: this, loop: true }); 
}

function spawnLighter() {
    let y = Phaser.Math.Between(150, 450);
    let l = lighters.create(500, y, 'lighter').setScale(0.08);
    l.body.allowGravity = false; l.setVelocityX(-180); l.startY = y; l.body.setCircle(180).setOffset(90, 90);
    flames.create(l.x - 45, y, 'flame').setScale(0.08);
}

function spawnBongs() {
    const y = Phaser.Math.Between(150, 450);
    const top = bongs.create(550, y - 140, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(550, y + 140, 'bong').setOrigin(0.5, 0);
    top.body.allowGravity = false; bot.body.allowGravity = false;
    top.setVelocityX(-210); bot.setVelocityX(-210);
    top.body.setSize(80, 380).setOffset(320, 0); bot.body.setSize(80, 380).setOffset(320, 0);
}

function gameOver() { 
    if (!isStarted) return; isStarted = false; playSfx('crash'); this.physics.pause(); 
    let final = Math.floor(score);
    if (final > champScore) {
        this.cameras.main.flash(500, 255, 255, 255);
        localStorage.setItem('hoppyNugChampScore', final);
        localStorage.setItem('hoppyNugChampName', playerName);
        champScore = final; champName = playerName;
    }
    if (final > highScore) localStorage.setItem('hoppyNugBest', final);
    updateUI(); showOnly('game-over'); 
    document.getElementById('final-score-text').innerText = "SCORE: " + final; 
}
</script>
</body>
</html>

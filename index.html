<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Orbitron', sans-serif; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }
        #input-overlay { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; text-align: center; pointer-events: none; }
        input#player-name { 
            background: rgba(0,0,0,0.8); border: 2px solid #ffcc00; color: #ffcc00; 
            padding: 12px; font-size: 20px; border-radius: 8px; text-align: center; 
            width: 200px; outline: none; font-family: 'Orbitron', sans-serif; 
            pointer-events: auto; /* Only the input is clickable */
        }
    </style>
</head>
<body>
    <div id="input-overlay">
        <input type="text" id="player-name" placeholder="ID TAG" maxlength="10">
    </div>

<script>
let score = 0, isStarted = false, hasShield = false, playerName = "NUGGY";
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic, hopSound, player, bongs, lighters, flames, shields, vaporTrail, vaporUp, vaporDown, scoreText, shieldStatusText, recordText;
let starGroupFar, starGroup, startGroup, gameOverGroup;

const config = {
    type: Phaser.AUTO, width: 400, height: 600, backgroundColor: '#000',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {
    this.load.image('nug', 'nug.png'); 
    this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); 
    this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png');
    this.load.image('summa_logo', 'summa.png'); 
    this.load.audio('bgm', 'background_track.mp3');
    this.load.audio('hop', 'jump_sound.mp3');
    
    let s = this.make.graphics(); s.fillStyle(0xffffff, 1); s.fillCircle(2, 2, 2); s.generateTexture('star', 4, 4);
    let v = this.make.graphics(); v.fillStyle(0xffffff, 1); v.fillCircle(8, 8, 8); v.generateTexture('vapor_puff', 16, 16);
}

function create() {
    // 🌌 Parallax Background
    starGroupFar = this.add.group();
    starGroup = this.add.group();
    this.time.addEvent({ delay: 200, callback: () => {
        let star = this.add.image(420, Phaser.Math.Between(0, 600), 'star').setAlpha(0.2).setScale(0.5);
        star.setData('speed', 1); starGroupFar.add(star);
    }, loop: true });
    this.time.addEvent({ delay: 400, callback: () => {
        let star = this.add.image(420, Phaser.Math.Between(0, 600), 'star').setAlpha(0.6);
        star.setData('speed', 3); starGroup.add(star);
    }, loop: true });

    // 🏆 UI Elements
    scoreText = this.add.text(20, 20, '', { fontSize: '28px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(100);
    shieldStatusText = this.add.text(20, 55, '', { fontSize: '16px', fill: '#ffffff', fontFamily: 'Orbitron' }).setDepth(100);
    recordText = this.add.text(200, 560, 'TENT RECORD: ' + champScore, { fontSize: '20px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5).setDepth(100);
    this.add.image(380, 580, 'summa_logo').setScale(0.12).setAlpha(0.5).setDepth(1).setOrigin(1,1);

    // 🎵 Audio
    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });
    hopSound = this.sound.add('hop', { volume: 0.3 });

    // 💨 Particles
    vaporTrail = this.add.particles(0, 0, 'vapor_puff', { scale: { start: 0.4, end: 1.5 }, alpha: { start: 0.6, end: 0 }, lifespan: 1000, speedX: { min: -150, max: -200 }, emitting: false }).setDepth(5);
    vaporUp = this.add.particles(0, 0, 'vapor_puff', { scale: { start: 0.5, end: 2 }, alpha: { start: 0.5, end: 0 }, lifespan: 1500, speedY: { min: -50, max: -100 }, frequency: -1 }).setDepth(4);
    vaporDown = this.add.particles(0, 0, 'vapor_puff', { scale: { start: 0.5, end: 2 }, alpha: { start: 0.5, end: 0 }, lifespan: 1500, speedY: { min: 50, max: 100 }, frequency: -1 }).setDepth(4);

    // 👨‍🚀 Player & Groups
    player = this.physics.add.sprite(100, 300, 'nug').setScale(0.35).setDepth(10);
    player.body.setCircle(45, 290, 95); 
    player.body.allowGravity = false;
    bongs = this.physics.add.group(); 
    lighters = this.physics.add.group(); 
    shields = this.physics.add.group();
    flames = this.add.group();

    this.physics.add.overlap(player, bongs, (p, b) => handleHit.call(this, b), null, this);
    this.physics.add.overlap(player, lighters, (p, l) => handleHit.call(this, l), null, this);
    this.physics.add.overlap(player, shields, (p, s) => { s.destroy(); hasShield = true; }, null, this);

    // 🟢 START MENU (Canvas-Based)
    startGroup = this.add.container(200, 300).setDepth(2000);
    let startBg = this.add.rectangle(0, 0, 320, 380, 0x0a0500, 0.98).setStrokeStyle(4, 0xffcc00);
    let titleTxt = this.add.text(0, -120, 'HOPPYNUG', { fontSize: '38px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    
    // LIGHT UP BUTTON (Canvas)
    let startBtnBg = this.add.rectangle(0, 80, 220, 60, 0xffcc00).setInteractive();
    let startBtnTxt = this.add.text(0, 80, 'LIGHT UP', { fontSize: '26px', fill: '#000', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    
    startGroup.add([startBg, titleTxt, startBtnBg, startBtnTxt]);

    startBtnBg.on('pointerdown', () => {
        let inputField = document.getElementById('player-name');
        if(inputField.value) playerName = inputField.value.toUpperCase();
        inputField.blur();
        document.getElementById('input-overlay').style.display = 'none';
        startGroup.destroy();
        
        if (!this.scale.isFullscreen) this.scale.startFullscreen();
        if (this.sound.context.state === 'suspended') this.sound.context.resume();
        
        startGame.call(this);
    });

    this.input.on('pointerdown', () => { 
        if (!isStarted) return;
        player.setVelocityY(-410);
        hopSound.play(); 
        player.setTexture('nug_active'); 
        this.time.delayedCall(150, () => { if (isStarted) player.setTexture('nug'); }); 
    });
}

function startGame() {
    isStarted = true; score = 0; hasShield = false;
    player.setPosition(100, 300);
    player.body.allowGravity = true;
    player.setTint(0xffffff);
    scoreText.setText(playerName + ": 0");
    vaporTrail.start(); 
    if (!bgMusic.isPlaying) bgMusic.play();
    this.spawnTimer = this.time.addEvent({ delay: 2200, callback: spawnLevel, callbackScope: this, loop: true }); 
}

function spawnLevel() {
    if (!isStarted) return;
    const y = Phaser.Math.Between(150, 450);
    const top = bongs.create(550, y - 140, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(550, y + 140, 'bong').setOrigin(0.5, 0);
    [top, bot].forEach(b => { b.body.allowGravity = false; b.setVelocityX(-210); b.body.setSize(80, 380).setOffset(320, 0); });

    if (Math.random() > 0.7) {
        let lY = Phaser.Math.Between(100, 500);
        let l = lighters.create(650, lY, 'lighter').setScale(0.08);
        l.body.allowGravity = false; l.setVelocityX(-180);
        l.setData('startY', lY); l.setData('time', 0);
        l.body.setCircle(360).setOffset(180, 90);
        flames.add(this.add.image(l.x, lY, 'flame').setScale(0.08).setDepth(11));
    }
    if (Math.random() > 0.85 && !hasShield) {
        let sY = Phaser.Math.Between(150, 450);
        let s = shields.create(600, sY, 'summa_logo').setScale(0.1).setTint(0xffcc00);
        s.body.allowGravity = false; s.setVelocityX(-210);
        s.setData('startY', sY); s.setData('time', 0);
    }
}

function update() {
    starGroupFar.getChildren().forEach(s => { s.x -= s.getData('speed'); if(s.x < -50) s.destroy(); });
    starGroup.getChildren().forEach(s => { s.x -= s.getData('speed'); if(s.x < -50) s.destroy(); });

    if (!isStarted) { player.y = 300 + Math.sin(this.time.now / 400) * 10; return; }
    if (player.y > 600 || player.y < 0) { gameOver.call(this); return; }

    vaporTrail.emitParticleAt(player.x - 20, player.y);

    bongs.getChildren().forEach(b => {
        if (b.x > -50 && b.x < 450 && this.time.now % 120 < 20) {
            if (b.flipY) vaporDown.emitParticleAt(b.x, b.y + 10); else vaporUp.emitParticleAt(b.x, b.y - 10);
        }
        if (b.x < player.x && !b.scored) { 
            score += 0.5; if(Math.floor(score) > Math.floor(score - 0.5)) scoreText.setText(playerName + ": " + Math.floor(score));
            b.scored = true; 
        }
        if (b.x < -100) b.destroy();
    });

    lighters.getChildren().forEach((l, i) => {
        let t = l.getData('time') + 0.02; l.setData('time', t);
        l.y = l.getData('startY') + Math.sin(t) * 30; l.angle += 2;
        let f = flames.getChildren()[i];
        if (f) {
            let rad = Phaser.Math.DegToRad(l.angle);
            f.x = l.x + Math.cos(rad) * -52; // Offset to left metal tip
            f.y = l.y + Math.sin(rad) * -52;
            f.angle = l.angle;
            if(this.time.now % 150 < 45) { 
                f.setAlpha(Phaser.Math.FloatBetween(0.4, 0.9));
                f.setScale(Phaser.Math.FloatBetween(0.07, 0.085));
            }
        }
        if (l.x < -100) { l.destroy(); if(f) f.destroy(); }
    });

    shields.getChildren().forEach(s => {
        let t = s.getData('time') + 0.02; s.setData('time', t);
        s.y = s.getData('startY') + Math.sin(t) * 50; if (s.x < -100) s.destroy();
    });

    if (hasShield) { player.setTint(0xffcc00); shieldStatusText.setText("🛡️ SUMMA SHIELD ACTIVE"); }
    else { player.clearTint(); shieldStatusText.setText(""); }
}

function handleHit(obj) {
    if (hasShield && obj) { 
        hasShield = false; player.setTint(0xff0000); obj.destroy(); this.cameras.main.shake(200, 0.02);
        this.time.delayedCall(200, () => { if(isStarted) player.setTint(0xffcc00); });
        return;
    }
    gameOver.call(this);
}

function gameOver() { 
    if (!isStarted) return; isStarted = false;
    player.setTint(0xff0000); this.physics.pause(); vaporTrail.stop();
    if (this.spawnTimer) this.spawnTimer.remove();
    
    let final = Math.floor(score);
    if (final > champScore) { 
        champScore = final; 
        localStorage.setItem('hoppyNugChampScore', final); 
        recordText.setText('TENT RECORD: ' + final); 
    }

    gameOverGroup = this.add.container(200, 300).setDepth(2000);
    let bg = this.add.rectangle(0, 0, 280, 220, 0x0a0500, 0.95).setStrokeStyle(4, 0xffcc00);
    let txt = this.add.text(0, -60, 'CASHED OUT!', { fontSize: '28px', fill: '#ffffff', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    let scr = this.add.text(0, -10, final, { fontSize: '42px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    let btnBg = this.add.rectangle(0, 60, 180, 50, 0xffcc00).setInteractive();
    let btnTxt = this.add.text(0, 60, 'RE-UP', { fontSize: '22px', fill: '#000', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    
    gameOverGroup.add([bg, txt, scr, btnBg, btnTxt]);
    
    btnBg.on('pointerdown', () => {
        gameOverGroup.destroy();
        bongs.clear(true, true); lighters.clear(true, true); shields.clear(true, true); flames.clear(true, true);
        this.physics.resume();
        startGame.call(this);
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HoppyNug - SUMMA LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        /* This keeps the game centered and prevents the 'huge' look */
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        canvas { box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
    </style>
</head>
<body>

<script>
let score = 0, isStarted = false, hasShield = false, playerName = "NUGGY";
let champScore = parseInt(localStorage.getItem('hoppyNugChampScore')) || 0;
let bgMusic, hopSound, player, bongs, lighters, flames, scoreText, recordText;

const config = {
    type: Phaser.AUTO,
    width: 400, // Fixed internal width to prevent 'huge' graphics
    height: 600, // Fixed internal height
    backgroundColor: '#000',
    scale: {
        mode: Phaser.Scale.FIT, // This fits the 400x600 box into your screen perfectly
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {
    this.load.image('nug', 'nug.png'); 
    this.load.image('nug_active', 'nug_active.png'); 
    this.load.image('bong', 'bong.png'); 
    this.load.image('lighter', 'lighter.png'); 
    this.load.image('flame', 'flame.png');
    this.load.image('summa_logo', 'summa.png'); 
    this.load.audio('bgm', 'background_track.mp3');
    this.load.audio('hop', 'jump_sound.mp3');
}

function create() {
    const cx = 200, cy = 300;

    // Background Record
    recordText = this.add.text(cx, 570, 'TENT RECORD: ' + champScore, { fontSize: '18px', fill: '#ffcc00', fontFamily: 'Orbitron' }).setOrigin(0.5);
    this.add.image(380, 580, 'summa_logo').setScale(0.1).setAlpha(0.2).setOrigin(1, 1);

    // --- CONSOLIDATED MENU ---
    let menuGroup = this.add.container(0, 0).setDepth(100);
    let bg = this.add.rectangle(cx, cy, 300, 300, 0x000000).setStrokeStyle(3, 0xffcc00);
    let title = this.add.text(cx, cy - 90, 'HOPPYNUG', { fontSize: '30px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    
    // The "Light Up" Button triggers Fullscreen to hide the address bar
    let btn = this.add.rectangle(cx, cy + 60, 200, 60, 0xffcc00).setInteractive();
    let btnTxt = this.add.text(cx, cy + 60, 'LIGHT UP', { fontSize: '22px', fill: '#000', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5);
    
    let promptTxt = this.add.text(cx, cy - 10, 'CLICK TO TAG', { fontSize: '16px', fill: '#ffffff', fontFamily: 'Orbitron' }).setOrigin(0.5).setInteractive();

    menuGroup.add([bg, title, btn, btnTxt, promptTxt]);

    promptTxt.on('pointerdown', () => {
        let name = prompt("ID TAG:", playerName);
        if (name) {
            playerName = name.toUpperCase().substring(0, 10);
            promptTxt.setText(playerName);
        }
    });

    btn.on('pointerdown', () => {
        // HIDES ADDRESS BAR
        if (!this.scale.isFullscreen) {
            this.scale.startFullscreen();
        }
        
        menuGroup.destroy();
        if (this.sound.context.state === 'suspended') this.sound.context.resume();
        
        isStarted = true;
        player.body.allowGravity = true;
        scoreText.setText(playerName + ": 0").setVisible(true);
        bgMusic.play();
        this.spawnTimer = this.time.addEvent({ delay: 2200, callback: spawnLevel, callbackScope: this, loop: true });
    });

    // --- GAME WORLD ---
    scoreText = this.add.text(20, 20, '', { fontSize: '24px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setDepth(10).setVisible(false);
    bgMusic = this.sound.add('bgm', { loop: true, volume: 0.15 });
    hopSound = this.sound.add('hop', { volume: 0.3 });
    
    player = this.physics.add.sprite(100, 300, 'nug').setScale(0.35).setDepth(5);
    player.body.allowGravity = false;
    
    bongs = this.physics.add.group(); 
    lighters = this.physics.add.group(); 
    flames = this.add.group();

    this.physics.add.overlap(player, bongs, () => gameOver.call(this));
    this.physics.add.overlap(player, lighters, () => gameOver.call(this));

    this.input.on('pointerdown', (p) => { 
        if (!isStarted) return;
        player.setVelocityY(-400);
        hopSound.play(); 
        player.setTexture('nug_active'); 
        this.time.delayedCall(150, () => { if (isStarted) player.setTexture('nug'); }); 
    });
}

function spawnLevel() {
    if (!isStarted) return;
    const y = Phaser.Math.Between(150, 450);
    const top = bongs.create(500, y - 160, 'bong').setOrigin(0.5, 1).setFlipY(true);
    const bot = bongs.create(500, y + 160, 'bong').setOrigin(0.5, 0);
    [top, bot].forEach(b => { 
        b.body.allowGravity = false; 
        b.setVelocityX(-210); 
        b.body.setSize(60, 400); // Tighten hitboxes so it's not 'fucked'
    });

    if (Math.random() > 0.6) {
        let lY = Phaser.Math.Between(100, 500);
        let l = lighters.create(600, lY, 'lighter').setScale(0.08);
        l.body.allowGravity = false; l.setVelocityX(-180);
        flames.add(this.add.image(l.x, lY, 'flame').setScale(0.08).setDepth(6));
    }
}

function update() {
    if (!isStarted) return;
    if (player.y > 600 || player.y < 0) { gameOver.call(this); return; }

    bongs.getChildren().forEach(b => {
        if (b.x < player.x && !b.scored) { 
            score += 0.5; 
            if(Math.floor(score) > Math.floor(score - 0.5)) scoreText.setText(playerName + ": " + Math.floor(score));
            b.scored = true; 
        }
        if (b.x < -100) b.destroy();
    });

    lighters.getChildren().forEach((l, i) => {
        l.angle += 2;
        let f = flames.getChildren()[i];
        if (f) {
            let rad = Phaser.Math.DegToRad(l.angle);
            f.x = l.x + Math.cos(rad) * -60;
            f.y = l.y + Math.sin(rad) * -60;
            f.angle = l.angle;
            f.setAlpha(this.time.now % 400 < 200 ? 0.4 : 1);
        }
        if (l.x < -100) { l.destroy(); if(f) f.destroy(); }
    });
}

function gameOver() { 
    if (!isStarted) return; isStarted = false;
    this.physics.pause();
    this.add.text(200, 300, 'CASHED OUT', { fontSize: '32px', fill: '#ffcc00', fontFamily: 'Orbitron', fontWeight: '900' }).setOrigin(0.5).setDepth(200);
    setTimeout(() => { location.reload(); }, 1500);
}
</script>
</body>
</html>
